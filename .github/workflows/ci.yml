name: CI

on:
  push:
    branches: [main]
    paths:
      - app/**
      - k8s/helm/todo-app/**
      - '!k8s/helm/todo-app/image-overrides.yaml'
      - .github/workflows/ci.yml

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_REPO: todo-app-frontend
  BACKEND_REPO: todo-app-backend

jobs:
  build-and-publish:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RUNNER_GITHUB_PAT || github.token }}

      - name: Configure Docker ECR credential helper
        run: |
          mkdir -p ~/.docker
          printf '{ "credsStore": "ecr-login" }\n' > ~/.docker/config.json

      - name: Build and push frontend
        run: |
          docker build -t "$REGISTRY/$FRONTEND_REPO:${GITHUB_SHA}" -t "$REGISTRY/$FRONTEND_REPO:latest" app/frontend
          docker push "$REGISTRY/$FRONTEND_REPO:${GITHUB_SHA}"
          docker push "$REGISTRY/$FRONTEND_REPO:latest"

      - name: Build and push backend
        run: |
          docker build -t "$REGISTRY/$BACKEND_REPO:${GITHUB_SHA}" -t "$REGISTRY/$BACKEND_REPO:latest" app/backend
          docker push "$REGISTRY/$BACKEND_REPO:${GITHUB_SHA}"
          docker push "$REGISTRY/$BACKEND_REPO:latest"

      - name: Update image overrides
        run: |
          node <<'NODE'
          const fs = require('fs');
          const sha = process.env.GITHUB_SHA;
          fs.writeFileSync('k8s/helm/todo-app/image-overrides.yaml', `frontend:
            image:
              tag: ${sha}
          backend:
            image:
              tag: ${sha}
          `.replace(/^ {10}/gm, ''));
          NODE

      - name: Commit image overrides
        run: |
          if git diff --quiet -- k8s/helm/todo-app/image-overrides.yaml; then
            echo "No image override changes"
            exit 0
          fi
          git config user.name "foxtrot-runner"
          git config user.email "foxtrot-runner@users.noreply.github.com"
          git add k8s/helm/todo-app/image-overrides.yaml
          git commit -m "chore: update image tags ${GITHUB_SHA}"
          git push
