apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    {{- include "todo-app.labels" . | nindent 4 }}
data:
  todo-app.json: |
    {
      "title": "Todo App",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "Request rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum(rate(http_requests_total[5m])) by (route)", "legendFormat": "{{`{{route}}`}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency percentiles",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))", "legendFormat": "p95 {{`{{route}}`}}" },
            { "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))", "legendFormat": "p50 {{`{{route}}`}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Error rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m]))", "legendFormat": "5xx" }
          ]
        },
        {
          "type": "logs",
          "title": "Backend logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "datasource": { "type": "loki", "uid": "loki" }, "expr": "{namespace=\"todo-app\", app_kubernetes_io_component=\"backend\"}" }
          ]
        }
      ]
    }
